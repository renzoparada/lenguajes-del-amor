services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lenguajes
      POSTGRES_PASSWORD: lenguajes
      POSTGRES_DB: lenguajes
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenguajes"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lenguajes:lenguajes@db:5432/lenguajes?schema=public
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LOVE_LANGUAGES_FROM_EMAIL: ${LOVE_LANGUAGES_FROM_EMAIL:-}
    ports:
      - "3000:3000"

volumes:
  db_data:
